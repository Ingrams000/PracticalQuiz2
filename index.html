<!DOCTYPE html>
<html>
  <head>
    <title>Practical Quiz 2 - A-Frame Scene</title>
    <!-- Loading A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene shadow="type: pcfsoft">
      
      <!-- 1. ENVIRONMENT & LIGHTING -->
      <a-sky color="#87CEEB"></a-sky> <!-- Sky Blue -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#555" shadow="receive: true"></a-plane> <!-- Floor -->
      
      <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
      <a-light type="directional" position="-2 4 3" intensity="0.8" castShadow="true"></a-light>

      <!-- 2. THE TABLE (Procedural) -->
      <a-entity id="table" position="0 0 -1">
        <!-- Table Top -->
        <a-box position="0 1 0" width="3.5" height="0.1" depth="2" color="#4B2C20" shadow></a-box>
        <!-- Table Legs -->
        <a-cylinder position="1.5 0.5 0.8" radius="0.05" height="1" color="#2F1B12"></a-cylinder>
        <a-cylinder position="-1.5 0.5 0.8" radius="0.05" height="1" color="#2F1B12"></a-cylinder>
        <a-cylinder position="1.5 0.5 -0.8" radius="0.05" height="1" color="#2F1B12"></a-cylinder>
        <a-cylinder position="-1.5 0.5 -0.8" radius="0.05" height="1" color="#2F1B12"></a-cylinder>
      </a-entity>

      <!-- 3. CHAIRS (Minimum 2) -->
      <!-- Chair Left -->
      <a-entity id="chair1" position="-2 0 -1" rotation="0 90 0">
        <a-box position="0 0.55 0" width="0.8" height="0.1" depth="0.8" color="#6F4E37" shadow></a-box> <!-- Seat -->
        <a-box position="0 1.1 -0.35" width="0.8" height="1" depth="0.1" color="#6F4E37" shadow></a-box> <!-- Back -->
        <a-cylinder position="0.3 0.25 0.3" radius="0.03" height="0.5" color="#2F1B12"></a-cylinder>
        <a-cylinder position="-0.3 0.25 0.3" radius="0.03" height="0.5" color="#2F1B12"></a-cylinder>
      </a-entity>

      <!-- Chair Right -->
      <a-entity id="chair2" position="2 0 -1" rotation="0 -90 0">
        <a-box position="0 0.55 0" width="0.8" height="0.1" depth="0.8" color="#6F4E37" shadow></a-box>
        <a-box position="0 1.1 -0.35" width="0.8" height="1" depth="0.1" color="#6F4E37" shadow></a-box>
        <a-cylinder position="0.3 0.25 0.3" radius="0.03" height="0.5" color="#2F1B12"></a-cylinder>
        <a-cylinder position="-0.3 0.25 0.3" radius="0.03" height="0.5" color="#2F1B12"></a-cylinder>
      </a-entity>

      <!-- 4. ITEMS ON TABLE -->
      <!-- Milo Tin -->
      <a-cylinder position="-0.7 1.3 -1.2" radius="0.18" height="0.5" color="#004d00" shadow>
        <a-cylinder position="0 0.26 0" radius="0.185" height="0.02" color="#ffd700"></a-cylinder> <!-- Lid -->
        <a-text value="MILO" position="-0.15 0 0.19" scale="0.3 0.3 0.3" color="white"></a-text>
      </a-cylinder>

      <!-- Milk Tin -->
      <a-cylinder position="0.7 1.2 -0.8" radius="0.15" height="0.3" color="#f0f0f0" shadow>
        <a-cylinder position="0 0.16 0" radius="0.15" height="0.01" color="#silver"></a-cylinder>
        <a-text value="MILK" position="-0.12 0 0.16" scale="0.25 0.25 0.25" color="blue"></a-text>
      </a-cylinder>

      <!-- Cup 1 (Blue) -->
      <a-entity position="-0.2 1.15 -0.7">
        <a-cylinder radius="0.08" height="0.2" color="#0000FF"></a-cylinder>
        <a-torus position="0.08 0 0" radius="0.05" radius-tubular="0.01" arc="180" rotation="0 0 -90" color="#0000FF"></a-torus>
      </a-entity>

      <!-- Cup 2 (Red) -->
      <a-entity position="0.2 1.15 -1.3">
        <a-cylinder radius="0.08" height="0.2" color="#FF0000"></a-cylinder>
        <a-torus position="0.08 0 0" radius="0.05" radius-tubular="0.01" arc="180" rotation="0 0 -90" color="#FF0000"></a-torus>
      </a-entity>

      <!-- CAMERA -->
      <a-entity position="0 2.5 3" rotation="-15 0 0">
        <a-camera></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
